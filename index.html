<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GEO QUEST AR | 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Three.js як глобальний об'єкт (стабільна версія) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff;
            --green: #00ff88;
            --warn: #ffaa00;
            --danger: #ff3366;
            --bg: #000a0a;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { overflow: hidden; background: var(--bg); font-family: 'Exo 2', sans-serif; }

        #video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            transform: scaleX(-1);
        }
        #canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* ── ПРОГРЕС ── */
        #progress-container {
            position: absolute; top: 0; left: 0; width: 100%;
            height: 4px; background: rgba(0,255,255,0.08); z-index: 150;
            padding-top: var(--safe-top);
        }
        #progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            box-shadow: 0 0 12px var(--cyan);
            transition: width 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
        }

        #score-badge {
            position: absolute; top: calc(12px + var(--safe-top));
            right: calc(16px + var(--safe-right));
            z-index: 150; color: var(--cyan);
            font-family: 'Orbitron', monospace; font-size: 1rem;
            background: rgba(0,20,20,0.75); border: 1px solid rgba(0,255,255,0.3);
            padding: 6px 14px; border-radius: 20px; backdrop-filter: blur(10px);
            display: none;
        }

        #ui {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; gap: 16px;
            padding-bottom: calc(32px + var(--safe-bottom));
            padding-left: calc(16px + var(--safe-left));
            padding-right: calc(16px + var(--safe-right));
        }

        #gesture-hint {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,255,255,0.07);
            border: 1px solid rgba(0,255,255,0.25);
            border-radius: 16px; padding: 10px 18px;
            color: rgba(0,255,255,0.7); font-size: 0.85rem;
            animation: hint-pulse 2s ease-in-out infinite;
        }
        .fist-icon { font-size: 1.4rem; }
        @keyframes hint-pulse {
            0%,100% { opacity:0.6; transform: scale(1); }
            50% { opacity:1; transform: scale(1.03); }
        }

        #status {
            background: rgba(0,15,15,0.8);
            padding: 16px 24px; border-radius: 20px;
            color: var(--cyan); font-weight: 600;
            border: 1.5px solid rgba(0,255,255,0.4);
            text-align: center; width: 100%; max-width: 480px;
            font-size: 1.05rem; backdrop-filter: blur(15px);
            line-height: 1.4;
            transition: border-color 0.4s, color 0.4s;
        }
        #status.correct { border-color: rgba(0,255,136,0.6); color: var(--green); }
        #status.wrong   { border-color: rgba(255,170,0,0.6);  color: var(--warn); }

        #mic-btn {
            display: none; position: relative;
            width: 80px; height: 80px;
            background: var(--danger); border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.9);
            cursor: pointer; align-items: center; justify-content: center;
            animation: mic-idle 2s infinite;
        }
        #mic-btn.listening { background: var(--green); animation: mic-pulse 0.8s infinite; }
        
        @keyframes mic-idle {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,51,102,0.5); }
            50%      { box-shadow: 0 0 0 12px rgba(255,51,102,0); }
        }
        @keyframes mic-pulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }

        #wave-bars { display: none; align-items: flex-end; gap: 3px; height: 24px; }
        #wave-bars span { width: 4px; background: var(--green); border-radius: 2px; animation: wave-anim 0.6s infinite; }
        @keyframes wave-anim { 0%,100% { height: 4px; } 50% { height: 20px; } }

        /* СТАРТ ЕКРАН */
        #start-screen {
            position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, #001f1f 0%, #000 70%);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px; transition: opacity 0.5s ease;
        }
        .logo-main { font-family: 'Orbitron', monospace; font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 900; color: var(--cyan); text-shadow: 0 0 30px rgba(0,242,255,0.5); letter-spacing: 4px; }
        
        #user-name {
            padding: 16px; border-radius: 12px; border: 1.5px solid rgba(0,255,255,0.3);
            background: rgba(0,255,255,0.04); color: #fff; text-align: center; width: 100%; max-width: 300px;
            font-size: 1.1rem; margin-bottom: 16px; outline: none;
        }
        #btn-start {
            background: var(--cyan); color: #000; padding: 16px 48px; border-radius: 12px;
            font-weight: 700; font-family: 'Orbitron', monospace; border: none; cursor: pointer;
            width: 100%; max-width: 300px; text-transform: uppercase;
        }

        /* ФІНАЛЬНИЙ ЕКРАН */
        #finish-screen {
            position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 40%, #001a0d 0%, #000 70%);
            z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px; text-align: center;
        }
        #finish-screen.visible { display: flex; }
        .finish-title { font-family: 'Orbitron', monospace; font-size: 2rem; color: var(--green); margin: 10px 0; }
        #btn-next-room {
            background: var(--green); color: #000; padding: 16px 40px; border-radius: 12px;
            font-weight: 900; font-family: 'Orbitron', monospace; border: none; cursor: pointer; margin-top: 20px;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,10,10,0.95);
            z-index: 1800; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #loading-overlay.visible { display: flex; }
        .loader-ring { width: 50px; height: 50px; border: 3px solid rgba(0,255,255,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #speech-fallback { display: none; background: rgba(255,170,0,0.1); border: 1px solid var(--warn); border-radius: 14px; padding: 15px; color: var(--warn); margin-bottom: 10px; }
        #no-hand-msg { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 120; color: rgba(0,255,255,0.4); font-size: 0.8rem; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>
<div id="score-badge">★ <span id="score-val">0</span> / <span id="total-val">5</span></div>
<div id="no-hand-msg">НАВЕДИ РУКУ НА КАМЕРУ</div>

<div id="loading-overlay">
    <div class="loader-ring"></div>
    <div id="loading-text" style="color:var(--cyan); margin-top:15px; font-family:'Orbitron';">ІНІЦІАЛІЗАЦІЯ AI...</div>
</div>

<div id="start-screen">
    <div class="logo-main">GEO AR</div>
    <div style="color:var(--cyan); opacity:0.6; margin-bottom:30px; letter-spacing:4px;">EXPERT 2026</div>
    <input type="text" id="user-name" placeholder="Твоє ім'я..." maxlength="15">
    <button id="btn-start">Розпочати</button>
</div>

<div id="finish-screen">
    <div style="font-size:3rem;">⭐⭐⭐</div>
    <div class="finish-title" id="finish-title">МІСІЯ ВИКОНАНА!</div>
    <div id="finish-results" style="color:var(--cyan); margin-bottom:20px; font-size:1.2rem;"></div>
    <button id="btn-next-room">→ ДАЛІ ДО ЗАВДАНЬ</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div id="gesture-hint">
        <span class="fist-icon">✊</span>
        <span>Покажи кулак для питання</span>
    </div>
    <div id="speech-fallback"></div>
    <div id="status" style="display:none;"></div>
    <div id="wave-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <div id="mic-btn">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
</div>

<script type="module">
    // Завантажуємо тільки MediaPipe через ESM, Three.js вже є глобально
    import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const micBtn = document.getElementById('mic-btn');
    const progressBar = document.getElementById('progress-bar');
    const scoreVal = document.getElementById('score-val');
    const gestureHint = document.getElementById('gesture-hint');
    const noHandMsg = document.getElementById('no-hand-msg');

    let handLandmarker;
    let scene, camera, renderer, ring, masterGroup, holoPlane, holoVideo;
    let userName = "Explorer";
    let score = 0, currentIdx = 0;
    let isWaitingForGesture = false, isSpeaking = false, isRecording = false, gestureDebounce = false;
    let recognition;

    const questions = [
        { q: "Яка найбільша оболонка Землі, що об'єднує всі інші сфери?", a: ["географічна"] },
        { q: "Як називається повітряна оболонка планети?", a: ["атмосфера"] },
        { q: "Яка сфера Землі складається з усіх її вод?", a: ["гідросфера"] },
        { q: "Тверда оболонка Землі — це...", a: ["літосфера", "літо"] },
        { q: "Сфера, де панує життя, називається...", a: ["біосфера"] }
    ];

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'uk-UA';
        u.onend = () => { isSpeaking = false; if(callback) callback(); };
        isSpeaking = true;
        window.speechSynthesis.speak(u);
    }

    function setupScene() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        masterGroup = new THREE.Group();
        scene.add(masterGroup);

        ring = new THREE.Mesh(
            new THREE.TorusGeometry(0.3, 0.015, 16, 100),
            new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 2 })
        );
        masterGroup.add(ring);

        holoVideo = document.createElement('video');
        holoVideo.src = 'assets/video/guide_hologram.mp4';
        holoVideo.muted = true; holoVideo.loop = true; holoVideo.playsInline = true;

        const videoTex = new THREE.VideoTexture(holoVideo);
        const holoMat = new THREE.ShaderMaterial({
            uniforms: { uVideo: { value: videoTex }, uTime: { value: 0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D uVideo; uniform float uTime; varying vec2 vUv;
                void main() {
                    vec4 color = texture2D(uVideo, vUv);
                    if (color.g > (color.r + color.b) * 0.5 + 0.1) discard;
                    float scan = sin(vUv.y * 200.0 + uTime * 5.0) * 0.1;
                    gl_FragColor = vec4(color.rgb + vec3(0, 0.2, 0.3) * scan, 0.9);
                }`,
            transparent: true
        });

        holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.4), holoMat);
        holoPlane.position.y = 0.8; holoPlane.visible = false;
        masterGroup.add(holoPlane);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        camera.position.z = 3;
    }

    async function initAI() {
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('visible');
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
            runningMode: "VIDEO", numHands: 1
        });
        overlay.classList.remove('visible');
        startFirstQuestion();
    }

    function startFirstQuestion() {
        isWaitingForGesture = true;
        gestureHint.style.display = 'flex';
        speak(`Привіт ${userName}! Покажи кулак, щоб почати.`);
    }

    function triggerQuestion() {
        if (gestureDebounce || currentIdx >= questions.length) return;
        gestureDebounce = true;
        isWaitingForGesture = false;
        gestureHint.style.display = 'none';

        holoPlane.visible = true;
        holoVideo.play();

        const q = questions[currentIdx];
        statusDiv.innerText = q.q;
        statusDiv.style.display = 'block';
        statusDiv.className = '';

        speak(q.q, () => {
            micBtn.style.display = 'flex';
            statusDiv.innerText = "Слухаю відповідь...";
        });
    }

    micBtn.onclick = () => {
        if (isRecording) return;
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) { showFallback(); return; }

        isRecording = true;
        micBtn.classList.add('listening');
        document.getElementById('wave-bars').style.display = 'flex';

        recognition = new Speech();
        recognition.lang = 'uk-UA';
        recognition.onresult = (e) => {
            const result = e.results[0][0].transcript.toLowerCase();
            const correct = questions[currentIdx].a.some(ans => result.includes(ans));
            processResult(correct);
        };
        recognition.onerror = () => { isRecording = false; showFallback(); };
        recognition.onend = () => { isRecording = false; micBtn.classList.remove('listening'); document.getElementById('wave-bars').style.display = 'none'; };
        recognition.start();
    };

    function processResult(isCorrect) {
        micBtn.style.display = 'none';
        if (isCorrect) {
            score++; scoreVal.innerText = score;
            statusDiv.className = 'correct'; statusDiv.innerText = "Правильно!";
            ring.material.color.setHex(0x00ff88);
            speak("Чудово!");
        } else {
            statusDiv.className = 'wrong'; statusDiv.innerText = "Не зовсім...";
            ring.material.color.setHex(0xff3366);
            speak("Правильна відповідь: " + questions[currentIdx].a[0]);
        }

        setTimeout(() => {
            currentIdx++;
            progressBar.style.width = (currentIdx / questions.length * 100) + "%";
            holoPlane.visible = false;
            holoVideo.pause();
            ring.material.color.setHex(0x00f2ff);

            if (currentIdx < questions.length) {
                gestureDebounce = false;
                isWaitingForGesture = true;
                gestureHint.style.display = 'flex';
                statusDiv.style.display = 'none';
            } else {
                showFinish();
            }
        }, 3000);
    }

    function showFallback() {
        const fb = document.getElementById('speech-fallback');
        fb.style.display = 'block';
        fb.innerHTML = `Голос не підтримується. Відповідь: <b>${questions[currentIdx].a[0]}</b><br>
        <button onclick="window.manual(true)" style="margin-top:10px; padding:5px 15px;">Я відповів вірно</button>`;
    }

    window.manual = (res) => {
        document.getElementById('speech-fallback').style.display = 'none';
        processResult(res);
    };

    function showFinish() {
        const screen = document.getElementById('finish-screen');
        document.getElementById('finish-results').innerText = `${userName}, твій результат: ${score} з 5`;
        screen.classList.add('visible');
        speak(`Місія виконана! Твій результат ${score} з 5. Переходимо до наступного залу.`);
        
        setTimeout(() => {
            window.location.href = 'https://lessa2332.github.io/7room/';
        }, 5000);
    }

    document.getElementById('btn-next-room').onclick = () => {
        window.location.href = 'https://lessa2332.github.io/7room/';
    };

    function animate(time) {
        if (holoPlane) holoPlane.material.uniforms.uTime.value = time / 1000;
        if (ring) ring.rotation.z += 0.02;

        if (handLandmarker && video.readyState >= 2) {
            const results = handLandmarker.detectForVideo(video, performance.now());
            if (results.landmarks && results.landmarks[0]) {
                noHandMsg.style.opacity = 0;
                const hand = results.landmarks[0];
                masterGroup.position.x = (0.5 - hand[0].x) * 3;
                masterGroup.position.y = (0.5 - hand[0].y) * 2;
                masterGroup.visible = true;

                // Детекція кулака
                const isFist = hand[8].y > hand[6].y && hand[12].y > hand[10].y && hand[16].y > hand[14].y;
                if (isWaitingForGesture && isFist) triggerQuestion();
            } else {
                masterGroup.visible = false;
                if (isWaitingForGesture) noHandMsg.style.opacity = 1;
            }
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    document.getElementById('btn-start').onclick = async () => {
        userName = document.getElementById('user-name').value || "Explorer";
        document.getElementById('start-screen').style.opacity = 0;
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        setupScene();
        initAI();
        animate();
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
