# Конфігурація Cloudflare Worker для проксі Groq API
#
# Деплой:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler secret put GROQ_API_KEY     ← вставити свій реальний Groq-ключ
#   4. wrangler deploy
#
# Після деплою ти отримаєш URL типу:
#   https://superzoshyt-groq-proxy.<твій-субдомен>.workers.dev
#
# Цей URL потрібно підставити в js/*.js (GROQ_PROXY_URL),
# див. js/config.js / config.example.js.

name = "superzoshyt-groq-proxy"
main = "groq-proxy.js"
compatibility_date = "2024-01-01"

# GROQ_API_KEY додається через `wrangler secret put GROQ_API_KEY`,
# а НЕ прописується тут у відкритому вигляді.
